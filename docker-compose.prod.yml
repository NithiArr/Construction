services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: construction_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: construction_db
    ports:
      - "27017:27017" # Optional: remove if you don't need external access to DB
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - construction_network

  # Flask Application
  app:
    build: .
    container_name: construction_app
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - MONGODB_HOST=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-admin123}@mongodb:27017/construction_db?authSource=admin
      - FLASK_ENV=production
      - DEBUG=False
      - PORT=8080
    ports:
      - "80:8080" # Maps host port 80 to container port 8080
    volumes:
      - ./uploads:/app/uploads
      # NOTE: No code mount here. Production uses the built image.
    depends_on:
      - mongodb
    networks:
      - construction_network

networks:
  construction_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
