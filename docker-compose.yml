services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: construction_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: construction_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - construction_network

  # Flask Application
  app:
    build: .
    container_name: construction_app
    restart: unless-stopped
    environment:
      - SECRET_KEY=your-secret-key-here
      - MONGODB_HOST=mongodb://admin:admin123@mongodb:27017/construction_db?authSource=admin
      - FLASK_ENV=production
      - DEBUG=False
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
      - .:/app
    depends_on:
      - mongodb
    networks:
      - construction_network

networks:
  construction_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
